<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل هاك روبلوكس</title>
    <style>
        /* باقي تنسيقاتك تبدأ من هنا */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white; 
            text-align: center; 
            padding-top: 20px; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-box { 
            background-color: #1e1e1e; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 400px;
        }

        /* العنصر المتحرك */
        .version-tag {
            display: inline-block;
            color: #00f2ff;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px; /* مسافة للأسفل */
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            animation: floatUpDown 2s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        h1 { margin: 0 0 10px 0; font-size: 2.5em; }
        p { color: #aaa; margin-bottom: 25px; }

        .download-btn { 
            background: linear-gradient(45deg, #007bff, #00c6ff); 
            color: white; 
            padding: 18px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            display: block; 
            font-size: 1.2em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.6);
            background: linear-gradient(45deg, #0056b3, #009fcc);
        }
    </style>
</head>
<body>

    <div class="main-box">
        <!-- تم نقل الكود إلى هنا في الأعلى -->
        <div class="version-tag">
            🎖️ VER 1 🎖️
        </div>

        <h1>موقع البرامج</h1>
        <p>افضل مواقع تثبيت برامج خارجيه با احدث النسخه</p>
        <a href="https://skibiditech.co/" class="download-btn">الانتقال الئ الموقع</a>
    </div>

</body>
</html>
